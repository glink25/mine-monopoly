name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    environment: build

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        shell: bash

      - run: pnpm --filter @mine-monopoly/env run build
        shell: bash

      - name: Create .env
        shell: bash
        run: |
          cat > .env << EOF
          MONOPOLY_DOMAIN=${{ vars.MONOPOLY_DOMAIN }}
          PROTOCOL=${{ vars.PROTOCOL }}
          API_BASE_PREFIX=${{ vars.API_BASE_PREFIX || '' }}
          ICE_BASE_PREFIX=${{ vars.ICE_BASE_PREFIX || '' }}
          ADMIN_BASE_PREFIX=${{ vars.ADMIN_BASE_PREFIX || '' }}
          SERVER_PORT=${{ vars.SERVER_PORT }}
          ICE_SERVER_PORT=${{ vars.ICE_SERVER_PORT }}
          MONOPOLY_ADMIN_PORT=${{ vars.MONOPOLY_ADMIN_PORT }}
          NODE_ENV=production
          MAP_ENCRYPT_KEY=${{ secrets.MAP_ENCRYPT_KEY }}
          EOF

      - name: Build Client
        shell: bash
        run: pnpm --filter @mine-monopoly/client run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename Client Update Manifest
        shell: bash
        run: |
          for yml in apps/client/dist/electron/*/latest.yml; do
            mv "$yml" "$(dirname "$yml")/monopoly-client.yml"
          done

      - name: Build Map Editor
        shell: bash
        run: pnpm --filter @mine-monopoly/map-editor run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename Editor Update Manifest
        shell: bash
        run: |
          for yml in apps/map-editor/dist/electron/*/latest.yml; do
            mv "$yml" "$(dirname "$yml")/map-editor.yml"
          done

      - name: Upload Client Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-win
          path: |
            apps/client/dist/electron/*/*-Setup.exe
            apps/client/dist/electron/*/*-Setup.exe.blockmap
            apps/client/dist/electron/*/monopoly-client.yml
          if-no-files-found: error

      - name: Upload Editor Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: editor-win
          path: |
            apps/map-editor/dist/electron/*/*-Setup.exe
            apps/map-editor/dist/electron/*/*-Setup.exe.blockmap
            apps/map-editor/dist/electron/*/map-editor.yml
          if-no-files-found: error

      - name: Merge Release Notes
        shell: bash
        run: |
          {
            echo "## MineMonopoly Client"
            echo ""
            cat apps/client/build/release-notes.md
            echo ""
            echo "---"
            echo ""
            echo "## MineMonopoly Map Editor"
            echo ""
            cat apps/map-editor/build/release-notes.md
          } > release-notes.md

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: artifacts/release-notes.md
          draft: false
          files: |
            artifacts/**/*-Setup.exe

  upload-r2:
    needs: build
    runs-on: ubuntu-latest
    environment: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten & Upload to Cloudflare R2
        run: |
          mkdir -p r2-flat

          # 收集所有 exe / blockmap / yml 文件并展平到同一目录
          find artifacts -type f \( -name "*.exe" -o -name "*.blockmap" -o -name "*.yml" \) \
            -exec cp {} r2-flat/ \;

          echo "=== 准备上传到 R2 的文件 ==="
          ls -lh r2-flat/

          # 同步到 R2 (S3-compatible API)
          aws s3 sync r2-flat/ "s3://${R2_BUCKET_NAME}/releases/latest/download/" \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            --no-progress \
            --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
