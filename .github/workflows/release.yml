name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        shell: bash

      - run: pnpm --filter @mine-monopoly/env run build
        shell: bash

      - name: Create .env
        shell: bash
        run: |
          cat > .env << 'EOF'
          MONOPOLY_DOMAIN=localhost
          PROTOCOL=http
          API_BASE_PREFIX=
          ICE_BASE_PREFIX=
          ADMIN_BASE_PREFIX=
          SERVER_PORT=81
          ICE_SERVER_PORT=82
          MONOPOLY_ADMIN_PORT=80
          NODE_ENV=production
          MAP_ENCRYPT_KEY=changeme16chkey!
          EOF

      - name: Build Client
        shell: bash
        run: pnpm --filter @mine-monopoly/client run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Map Editor
        shell: bash
        run: pnpm --filter @mine-monopoly/map-editor run build -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Client Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-win
          path: |
            apps/client/dist/electron/**/*.exe
            apps/client/dist/electron/**/*.yml
            apps/client/dist/electron/**/*.blockmap
          if-no-files-found: warn

      - name: Upload Editor Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: editor-win
          path: |
            apps/map-editor/dist/electron/**/*.exe
            apps/map-editor/dist/electron/**/*.yml
            apps/map-editor/dist/electron/**/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.yml
            artifacts/**/*.blockmap
