services:
  monopoly-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: monopoly-server
    container_name: monopoly-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8081}:${SERVER_PORT:-8081}"  # 主服务器
      - "${ICE_SERVER_PORT:-8082}:${ICE_SERVER_PORT:-8082}"  # ICE 服务器
      - "${MONOPOLY_ADMIN_PORT:-8083}:${MONOPOLY_ADMIN_PORT:-8083}"  # Admin 管理面板
    env_file:
      - .env
    volumes:
      # Persist user-uploaded files (avatars, game maps, logs)
      - server-public:/app/apps/server/public
    networks:
      - monopoly-network

  coturn:
    image: coturn/coturn:debian
    container_name: monopoly-coturn
    restart: unless-stopped
    ports:
      - "${STUN_PORT:-3478}:3478"     # STUN
      - "${STUN_PORT:-3478}:3478/udp" # STUN UDP
      - "${TURN_PORT:-5349}:5349"     # TURN TLS
      - "${TURN_PORT:-5349}:5349/udp" # TURN TLS UDP
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    env_file:
      - .env
    command:
      - "-c"
      - "/etc/coturn/turnserver.conf"
      - "--prometheus"
      - "--prometheus-port=9641"
      - "--log-file=stdout"
    networks:
      - monopoly-network

networks:
  monopoly-network:
    external: true

volumes:
  server-public:
